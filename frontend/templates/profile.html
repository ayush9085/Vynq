{% extends "base.html" %}

{% block title %}Your Profile - {{ app_name }}{% endblock %}

{% block content %}
<div class="bg-gradient-subtle" style="min-height: 100vh; padding: 3rem 1rem;">
    <div class="container" style="max-width: 42rem;">
        <h1 style="font-size: 2.25rem; margin-bottom: 2rem; text-align: center;">Your Profile</h1>

        <div class="card" style="margin-bottom: 2rem;">
            <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem;">Basic Information</h2>
            
            <form style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">First Name</label>
                    <input type="text" value="Alex" style="padding: 0.75rem 1rem; border-radius: 0.5rem;" />
                </div>

                <div>
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Age</label>
                    <input type="number" value="26" style="padding: 0.75rem 1rem; border-radius: 0.5rem;" />
                </div>

                <div>
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Bio</label>
                    <textarea style="padding: 0.75rem 1rem; border-radius: 0.5rem; height: 8rem;" placeholder="Tell us about yourself..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Save Changes</button>
            </form>
        </div>

        <div class="card" style="margin-bottom: 2rem;">
            <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem;">Your Personality Traits</h2>
            
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span style="font-weight: 600;">Social Energy</span>
                        <span style="color: var(--color-lavender); font-weight: 600;">65%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" style="width: 65%;"></div>
                    </div>
                </div>

                <div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span style="font-weight: 600;">Information Processing</span>
                        <span style="color: var(--color-lavender); font-weight: 600;">42%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" style="width: 42%;"></div>
                    </div>
                </div>

                <div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span style="font-weight: 600;">Decision Making</span>
                        <span style="color: var(--color-lavender); font-weight: 600;">78%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" style="width: 78%;"></div>
                    </div>
                </div>
            </div>

            <a href="/onboarding" class="btn btn-secondary" style="display: inline-block; margin-top: 1.5rem;">Retake Assessment</a>
        </div>

        <div class="card">
            <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem;">Account Settings</h2>
            
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Email</label>
                    <input type="email" value="alex@example.com" style="padding: 0.75rem 1rem; border-radius: 0.5rem;" />
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button class="btn btn-secondary" style="flex: 1;">Change Password</button>
                    <button class="btn btn-outline" style="flex: 1; color: var(--color-gold); border-color: var(--color-gold);">Delete Account</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
